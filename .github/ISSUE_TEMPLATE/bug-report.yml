name: Bug Report
description: Report something that isn't working correctly
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in the details below to help us investigate.

  - type: input
    id: version
    attributes:
      label: Version
      description: Software version or commit hash where the bug occurs
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform
      description: "OS and environment (e.g., Raspberry Pi OS, Ubuntu 24.04, macOS 15)"

  - type: textarea
    id: actual
    attributes:
      label: What happened?
      description: Describe the bug. Include error messages and logs if available.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run '...'
        2. Navigate to '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Anything else that might help (screenshots, config, related issues)?
